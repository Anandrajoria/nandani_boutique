name: Deploy Nandani Boutique to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://7m6gzw9ixb.execute-api.ap-south-1.amazonaws.com/production/api
          VITE_ADMIN_EMAIL: nandaniboutique772@gmail.com

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy frontend to S3
        run: aws s3 sync frontend/dist/ s3://nandani-boutique --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E17MYHFOQPOJEC \
            --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../backend.zip . --exclude "*.log" --exclude "uploads/*" --exclude ".env" --exclude "node_modules/.cache/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy backend to Lambda
        run: |
          aws lambda update-function-code \
            --function-name nandani-boutique-api \
            --zip-file fileb://backend.zip \
            --region ap-south-1

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name nandani-boutique-api \
            --region ap-south-1

      - name: Verify Lambda deployment
        run: |
          curl https://7m6gzw9ixb.execute-api.ap-south-1.amazonaws.com/production/api/health
